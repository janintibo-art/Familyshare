name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assembler l'APK (debug)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Voir le contenu du dépôt (diagnostic)
        run: |
          echo "Contenu du dépôt (2 niveaux) :"
          find . -maxdepth 2 -not -path '*/.git/*' | sort

      - name: Extraire l'archive ZIP si le dépôt en contient une
        run: |
          ZIP=$(find . -maxdepth 2 -name '*.zip' -not -path '*/.git/*' | head -n 1)
          if [ -n "$ZIP" ]; then
            echo "Archive trouvée : $ZIP — extraction dans _src/"
            mkdir -p _src && unzip -q -o "$ZIP" -d _src
          else
            echo "Pas d'archive ZIP : on suppose des fichiers déjà présents."
          fi

      - name: Localiser le projet Gradle
        id: projet
        run: |
          FILE=$(find . -name 'settings.gradle.kts' -not -path '*/.git/*' | head -n 1)
          if [ -z "$FILE" ]; then
            echo "::error::settings.gradle.kts introuvable. Le dépôt doit contenir soit les fichiers du projet, soit une archive .zip du projet."
            exit 1
          fi
          DIR=$(dirname "$FILE")
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Projet Gradle trouvé dans : $DIR"

      - name: Installer le JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Préparer le SDK Android (+ acceptation des licences)
        uses: android-actions/setup-android@v3

      - name: Préparer Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Compiler l'APK de debug
        working-directory: ${{ steps.projet.outputs.dir }}
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Publier l'APK en artefact téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: FamilyShare-debug-apk
          path: ${{ steps.projet.outputs.dir }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
